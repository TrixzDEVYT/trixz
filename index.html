<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trixz - Stupid lol</title>

<!-- Rounded, cozy display + body fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Passion+One:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ FULL-PAGE BACKGROUND VIDEO ============
       Looping, muted, autoplaying background video. Swap the
       source path below for your own file inside images/. -->
  <video class="page-bg" autoplay muted loop playsinline>
    <source src="images/FondoSparkGroveMovimiento.mp4" type="video/mp4">
  </video>

  <!-- floating background blobs, purely decorative -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- dark mode toggle -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
    <span id="theme-icon">🌙</span>
  </button>

  <main class="page">

    <!-- ============ CARD FRAME ============
         site-card-frame = the thin outer border you see in the
         mqikeru reference. site-card = the big dotted orange card
         inside it. Both backgrounds are configurable in style.css. -->
    <div class="site-card-frame">
      <div class="site-card">

        <section class="hero">

          <!-- ============ LEFT: MASCOT + DIALOGUE ============ -->
          <div class="mascot-column">

            <div class="mascot-frame">
              <!-- swap this <img> source freely — it changes automatically via script.js -->
              <img id="mascot-img" class="mascot-img" src="images/idle.png" alt="Trixz">
            </div>

            <!-- speech-bubble style dialogue box -->
            <div class="dialogue-box" id="dialogue-box">
              <p id="dialogue-text">um... make yourself comfy!!</p>
            </div>

          </div>

          <!-- ============ RIGHT: INFO PANEL ============ -->
          <div class="info-column">

            <h1 class="site-title">Trixz<span class="title-dot">.</span></h1>
            <p class="site-subtitle">such an idiot!! :D</p>

            <div class="panel">
              <h2 class="panel-label">socials</h2>
              <div class="social-row">
                <a class="social-btn" href="#" target="_blank" rel="noopener" aria-label="Instagram">
                  <!-- inline SVG icon, swap freely, or give the button
                       its own image via --social-btn-bg-image in style.css -->
                  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="6"/>
                    <circle cx="12" cy="12" r="4.2"/>
                    <circle cx="17.3" cy="6.7" r="1.1" fill="currentColor" stroke="none"/>
                  </svg>
                </a>
                <a class="social-btn" href="#" target="_blank" rel="noopener" aria-label="X / Twitter">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M18.9 3H21.7L15.4 10.2L22.8 21H17L12.4 14.7L7.1 21H4.3L11 13.3L3.9 3H9.9L14 8.8L18.9 3ZM17.9 19.2H19.5L8.9 4.7H7.2L17.9 19.2Z"/>
                  </svg>
                </a>
                <a class="social-btn" href="#" target="_blank" rel="noopener" aria-label="Email">
                  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="5" width="18" height="14" rx="4"/>
                    <path d="M3.5 6.5L12 13L20.5 6.5"/>
                  </svg>
                </a>
              </div>

              <h2 class="panel-label">da still in progress button</h2>
              <div class="button-row">
                <a class="pill-btn" href="#">
                  <span>button1</span>
                </a>
                <a class="pill-btn pill-btn--alt" href="#">
                  <span>button2</span>
                </a>
              </div>
            </div>

          </div>

        </section>

      </div>
    </div>

    <p class="footnote">BTW THIS IS WIP!.</p>

  </main>

<script src="script.js"></script>
</body>
</html>
